# gcloud builds submit --config artifact.cloudbuild.yaml --region us-central1
# alias gcurl='curl -H "Authorization: Bearer $(gcloud auth print-access-token)"'
# gcurl https://containeranalysis.googleapis.com/v1/projects/$PROJECT_ID/occurrences

steps:
  - id: "Build Maven Artifact"
    name: "gcr.io/cloud-builders/mvn"
    args: ["package"]

artifacts:
  maven_artifacts:
  - repository: "https://us-central1-maven.pkg.dev/${PROJECT_ID}/guestbook-maven-repo"
    artifact_id: "backend"
    group_id: "com.example.guestbook"
    version: "1.0"
    path: "/workspace/target/backend-1.0.jar"

options:
  dynamic_substitutions: true
  requestedVerifyOption: VERIFIED